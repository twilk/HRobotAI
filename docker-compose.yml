# HRobot dev stack — two services (control-plane :3000, tenant-runtime :3001).
#
#   docker compose up -d                  # backing services only (postgres, redis, rabbitmq, keycloak)
#   docker compose --profile full up -d --build   # + both app containers
#   docker compose ps                     # check health
#   docker compose down                   # stop (add -v to wipe data)
#
# For day-to-day dev, run the apps on the host
# (`pnpm --filter @hrobot/control-plane dev`, `PORT=3001 pnpm --filter @hrobot/tenant-runtime dev`)
# against `docker compose up -d`. The containerized `control-plane` / `tenant-runtime`
# services (profile "full") are for CI / prod-parity and are NOT started by a bare
# `up -d`, so they never collide with host apps on :3000 / :3001.

services:
  postgres:
    image: postgres:16-alpine
    # POSTGRES_DB creates hrobot_control on first boot; the `postgres`
    # maintenance DB (used by POSTGRES_SUPERUSER_URL) always exists too.
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hrobot_control
    ports:
      - "5432:5432"
    volumes:
      - hrobot_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    # Default guest/guest; management UI at http://localhost:15672
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: ["start-dev"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"

  # Control-plane API as a container (CI/prod parity). For day-to-day dev, run it
  # on the host. Gated behind the "full" profile so a bare `docker compose up -d`
  # starts only backing services (no :3000 collision with a host app).
  control-plane:
    profiles: ["full"]
    build:
      context: .
      dockerfile: apps/control-plane/Dockerfile
    # Secrets come from .env (cp .env.example .env first); required:false so the
    # other services still start if .env is absent. Connection URLs are
    # overridden here to use compose service DNS names instead of localhost.
    env_file:
      - path: .env
        required: false
    environment:
      CONTROL_PLANE_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/hrobot_control
      POSTGRES_SUPERUSER_URL: postgresql://postgres:postgres@postgres:5432/postgres
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      KEYCLOAK_URL: http://keycloak:8080
      PORT: "3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "3000:3000"

  # Tenant-runtime API as a container (CI/prod parity). Same monorepo build, runs
  # the apps/tenant-runtime dist. Listens on 3001 to avoid the control-plane port.
  tenant-runtime:
    profiles: ["full"]
    build:
      context: .
      dockerfile: apps/tenant-runtime/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      CONTROL_PLANE_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/hrobot_control
      POSTGRES_SUPERUSER_URL: postgresql://postgres:postgres@postgres:5432/postgres
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      KEYCLOAK_URL: http://keycloak:8080
      PORT: "3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "3001:3001"

  # Grafik solver (FastAPI + CP-SAT). M2-A1 skeleton: GET /health + a STUB POST /solve carrying the
  # frozen ProblemInput/SolveResult contract; the CP-SAT model lands in M2-A2. Built from the
  # separate ./grafik-optimizer Python image (not the monorepo Node build). Gated behind "full"
  # like the other app services so a bare `docker compose up -d` starts only backing services.
  optimizer:
    profiles: ["full"]
    build:
      context: ./grafik-optimizer
      dockerfile: Dockerfile
    environment:
      # Unbuffered stdout so uvicorn/solver logs stream promptly under Docker.
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"

  # RESERVED SLOT — RL agent (roadmap #2, spec #1 §3/§41). The agent shares the optimizer image and
  # container build (same ./grafik-optimizer context); its training/serving entrypoint and behavior
  # are implemented in a later task, NOT here. Gated behind its own "agent" profile so it never
  # starts via `up -d` or `--profile full`; enable explicitly with `--profile agent` once built.
  agent:
    profiles: ["agent"]
    build:
      context: ./grafik-optimizer
      dockerfile: Dockerfile
    environment:
      PYTHONUNBUFFERED: "1"
    # command:  # set by the RL-agent task (shares the optimizer image; runs the agent loop, not uvicorn)

volumes:
  hrobot_pgdata:
