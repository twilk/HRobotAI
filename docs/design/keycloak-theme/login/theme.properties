# HRobot Keycloak login theme — "Refit for EU-trust" (see /DESIGN.md).
# Extends the stock `keycloak` login theme and layers HRobot styling on top, so it stays
# resilient across Keycloak upgrades (we only override CSS, not the FreeMarker templates).
parent=keycloak
import=common/keycloak

# Keep the parent's base stylesheet, then apply HRobot overrides last (cascade wins).
styles=css/login.css css/hrobot.css

# If you later add a wordmark/logo asset, drop it in resources/img/ and reference it from hrobot.css.
