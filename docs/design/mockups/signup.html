<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>HRobot · Utwórz konto</title>
<link rel="preconnect" href="https://api.fontshare.com" crossorigin />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@800,700&f[]=general-sans@400,500,600&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link href="system.css" rel="stylesheet" />
<style>
  .auth{justify-content:center}
  .slug-prev{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:12px;color:var(--muted)}
  .slug-prev .mono{color:var(--accent-ink);font-weight:500}
  .slug-ok{display:inline-flex;align-items:center;gap:4px;margin-left:auto;color:var(--verified);font-size:11px;font-weight:500}
  .slug-ok svg{width:13px;height:13px;stroke:var(--verified);stroke-width:2.2;fill:none}
  .pwbar{display:flex;gap:5px;margin-top:9px}
  .pwbar i{height:4px;flex:1;border-radius:3px;background:var(--line)}
  .pwbar i.on{background:var(--verified)}
  .pwmeta{display:flex;justify-content:space-between;margin-top:7px;font-size:11.5px;color:var(--muted)}
  .pwmeta b{color:var(--verified);font-weight:500}
  .field-ico{position:relative}
  .field-ico .input{padding-right:40px}
  .field-ico .vmark{position:absolute;right:13px;top:35px;width:18px;height:18px;stroke:var(--verified);stroke-width:2.2;fill:none}
</style>
</head>
<body>
  <div class="auth motif-navy">
    <div style="width:100%;max-width:432px;position:relative">
      <div class="auth-card">
        <div class="auth-head">
          <div class="auth-brand">
            <div class="mark"><i></i></div>
            <div class="wordmark">HRobot<span>.ai</span></div>
          </div>
          <h1>Utwórz konto</h1>
          <p class="lead">Bezpłatne 14 dni. Bez karty kredytowej.</p>
        </div>

        <div class="field">
          <label for="co">Nazwa firmy</label>
          <input id="co" class="input" type="text" value="ACME Sp. z o.o." />
        </div>

        <div class="field">
          <label for="slug">Adres przestrzeni roboczej</label>
          <div class="field-ico">
            <input id="slug" class="input ok" type="text" value="acme" />
            <svg class="vmark" viewBox="0 0 24 24"><path d="m5 12 4 4 10-10"/></svg>
          </div>
          <div class="slug-prev">
            Twój adres: <span class="mono">acme.hrobot.ai</span>
            <span class="slug-ok"><svg viewBox="0 0 24 24"><path d="m5 12 4 4 10-10"/></svg> dostępne</span>
          </div>
        </div>

        <div class="field">
          <label for="em">Email administratora</label>
          <input id="em" class="input" type="email" value="jan.kowalski@acme.pl" />
        </div>

        <div class="field" style="margin-bottom:20px">
          <label for="pw">Hasło</label>
          <input id="pw" class="input" type="password" value="••••••••••••••" />
          <div class="pwbar"><i class="on"></i><i class="on"></i><i class="on"></i></div>
          <div class="pwmeta"><span>Siła hasła</span><b>Silne</b></div>
        </div>

        <button class="btn btn-primary btn-block">Utwórz konto</button>

        <div class="auth-foot">Masz już konto? <a href="#">Zaloguj się</a></div>
      </div>

      <div class="trustline"><b>RODO</b> · Dane w UE · Szyfrowanie AES-256</div>
    </div>
  </div>
</body>
</html>
